name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            engine/package-lock.json
            scaffold/package-lock.json

      - name: Install engine dependencies
        run: cd engine && npm install

      - name: Install scaffold dependencies
        run: cd scaffold && npm install

      - name: TypeScript check (engine)
        run: cd engine && npx tsc --noEmit

      - name: TypeScript check (scaffold)
        run: cd scaffold && npx tsc --noEmit

      - name: Validate seed
        run: npx tsx scripts/validate-seed.ts scaffold/src/seed.ts

      - name: Graph integrity
        run: npx tsx scripts/graph-integrity.ts scaffold/src/seed.ts

      - name: Type sync check
        run: npx tsx scripts/check-type-sync.ts

      - name: Tool-skill parity
        run: npx tsx scripts/check-tool-parity.ts

      - name: Build viewer
        run: cd scaffold && npx vite build

      - name: Report bundle size
        run: |
          TOTAL=$(find scaffold/dist -type f \( -name '*.js' -o -name '*.css' \) -exec wc -c {} + | tail -1 | awk '{print int($1/1024)}')
          echo "### Bundle Size: ${TOTAL} KB" >> "$GITHUB_STEP_SUMMARY"
